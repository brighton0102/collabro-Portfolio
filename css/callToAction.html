<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <title>CollaBro Software Solutions | Innovative Design</title>
</head>
<body>

    <section class="cta-page">
        <div class="bg-glow"></div>

        <div class="container">
            <div class="hero-content">
                <span class="badge">Next-Gen Digital Solutions</span>
                <h1>CollaBro <span>Software</span> Solutions</h1>

                <div class="button-group">
                    <a href="#" class="btn btn-primary">Sign Up</a>

            </div>

            <div class="services-grid">
                <div class="service-card">
                    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Web Development">

                </div>
                <div class="service-card">
                    <img src="https://images.unsplash.com/photo-1617396900799-f4ec2b43c7ae?auto=format&fit=crop&w=600&q=80" alt="Billboard Design">
                    <h3>Billboard Design</h3>
                </div>
                <div class="service-card">
                    <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&w=600&q=80" alt="Poster & Logo Design">
